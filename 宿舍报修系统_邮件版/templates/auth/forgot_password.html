{% extends "base.html" %}
{% block title %}忘记密码 - 宿舍报修管理系统{% endblock %}
{% block content %}
<style>
    .forgot-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .forgot-card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        width: 450px;
        max-width: 95%;
    }
    .forgot-header {
        background: linear-gradient(135deg, #4a90d9 0%, #5b9bd5 100%);
        color: #fff;
        padding: 30px;
        text-align: center;
    }
    .forgot-body {
        padding: 40px 30px;
    }
    .form-control:focus {
        border-color: #4a90d9;
        box-shadow: 0 0 0 0.2rem rgba(74, 144, 217, 0.25);
    }
    .btn-send {
        background: linear-gradient(135deg, #4a90d9 0%, #5b9bd5 100%);
        border: none;
        padding: 12px;
        font-weight: 600;
    }
    .btn-send:hover {
        background: linear-gradient(135deg, #3a7bc8 0%, #4a8ac5 100%);
        color: #fff;
    }
</style>

<div class="forgot-container">
    <div class="forgot-card">
        <div class="forgot-header">
            <i class="bi bi-key fs-1 mb-3"></i>
            <h3>找回密码</h3>
            <p class="mb-0 opacity-75">请输入您注册的邮箱地址</p>
        </div>
        <div class="forgot-body">
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label">邮箱地址</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="请输入注册邮箱" required autofocus>
                    </div>
                    <small class="text-muted">我们将向此邮箱发送验证码</small>
                </div>
                <button type="submit" class="btn btn-send w-100 text-white">
                    <i class="bi bi-send me-2"></i>发送验证码
                </button>
            </form>
            
            <hr class="my-4">
            
            <p class="text-center mb-0">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>返回登录
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
