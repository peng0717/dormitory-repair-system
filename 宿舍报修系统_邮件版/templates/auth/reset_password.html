{% extends "base.html" %}
{% block title %}重置密码 - 宿舍报修管理系统{% endblock %}
{% block content %}
<style>
    .reset-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .reset-card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        overflow: hidden;
        width: 450px;
        max-width: 95%;
    }
    .reset-header {
        background: linear-gradient(135deg, #4a90d9 0%, #5b9bd5 100%);
        color: #fff;
        padding: 30px;
        text-align: center;
    }
    .reset-body {
        padding: 40px 30px;
    }
    .form-control:focus {
        border-color: #4a90d9;
        box-shadow: 0 0 0 0.2rem rgba(74, 144, 217, 0.25);
    }
    .btn-reset {
        background: linear-gradient(135deg, #4a90d9 0%, #5b9bd5 100%);
        border: none;
        padding: 12px;
        font-weight: 600;
    }
    .btn-reset:hover {
        background: linear-gradient(135deg, #3a7bc8 0%, #4a8ac5 100%);
        color: #fff;
    }
    .code-input {
        font-size: 24px;
        letter-spacing: 8px;
        text-align: center;
        font-weight: bold;
    }
</style>

<div class="reset-container">
    <div class="reset-card">
        <div class="reset-header">
            <i class="bi bi-shield-lock fs-1 mb-3"></i>
            {% if step == 'verify' %}
            <h3>输入验证码</h3>
            <p class="mb-0 opacity-75">验证码已发送至 {{ email }}</p>
            {% else %}
            <h3>设置新密码</h3>
            <p class="mb-0 opacity-75">请设置您的新密码</p>
            {% endif %}
        </div>
        <div class="reset-body">
            {% if step == 'verify' %}
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label">验证码</label>
                    <input type="text" name="code" class="form-control code-input" placeholder="______" maxlength="6" required autofocus>
                    <small class="text-muted">请输入6位数字验证码</small>
                </div>
                <button type="submit" class="btn btn-reset w-100 text-white">
                    <i class="bi bi-check-circle me-2"></i>验证
                </button>
            </form>
            
            <hr class="my-4">
            
            <p class="text-center mb-2">
                <small class="text-muted">没有收到邮件？</small>
            </p>
            <p class="text-center mb-0">
                <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>重新获取验证码
                </a>
            </p>
            
            {% else %}
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" name="new_password" class="form-control" placeholder="至少6个字符" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="再次输入新密码" required>
                </div>
                <button type="submit" class="btn btn-reset w-100 text-white">
                    <i class="bi bi-check-all me-2"></i>确认重置
                </button>
            </form>
            
            <hr class="my-4">
            
            <p class="text-center mb-0">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                    <i class="bi bi-arrow-left me-1"></i>返回登录
                </a>
            </p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
