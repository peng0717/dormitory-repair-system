{% extends "base.html" %}
{% block title %}个人信息{% endblock %}
{% block content %}
<div class="content-card">
    <h4 class="mb-4"><i class="bi bi-person-circle me-2"></i>个人信息</h4>
    
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                <small class="text-muted">用户名不可修改</small>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">姓名</label>
                <input type="text" name="name" class="form-control" value="{{ current_user.name }}" required>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">手机号</label>
                <input type="text" name="phone" class="form-control" value="{{ current_user.phone or '' }}">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">邮箱</label>
                <input type="email" name="email" class="form-control" value="{{ current_user.email or '' }}">
            </div>
        </div>
        
        <hr class="my-4">
        <h5 class="mb-3">修改密码</h5>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">当前密码</label>
                <input type="password" name="current_password" class="form-control" placeholder="留空则不修改">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">新密码</label>
                <input type="password" name="new_password" class="form-control" placeholder="至少6个字符">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">确认新密码</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="再次输入">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check2 me-2"></i>保存修改
        </button>
    </form>
</div>
{% endblock %}
