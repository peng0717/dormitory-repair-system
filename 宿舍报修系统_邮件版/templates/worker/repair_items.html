{% extends "base.html" %}
{% block title %}维修价格表{% endblock %}
{% block content %}
<div class="content-card">
    <h4 class="mb-4"><i class="bi bi-currency-dollar me-2"></i>维修价格表</h4>
    
    <div class="table-responsive">
        <table class="table table-modern">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>维修项目</th>
                    <th>价格</th>
                    <th>说明</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td><strong>{{ item.name }}</strong></td>
                    <td><span class="text-success fw-bold fs-5">¥{{ item.price }}</span></td>
                    <td>{{ item.description or '-' }}</td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center text-muted py-5">暂无维修项目</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
