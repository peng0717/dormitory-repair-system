{% extends "base.html" %}
{% block title %}提交投诉{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 600px;">
    <h4 class="mb-4"><i class="bi bi-chat-left-text me-2"></i>投诉反馈</h4>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">投诉内容 <span class="text-danger">*</span></label>
            <textarea name="content" class="form-control" rows="5" placeholder="请详细描述您的投诉内容..." required></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-send me-2"></i>提交投诉</button>
            <a href="{{ url_for('student.complaints') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
