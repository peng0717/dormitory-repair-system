{% extends "base.html" %}
{% block title %}{{ '编辑' if dormitory else '添加' }}宿舍{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 600px;">
    <h4 class="mb-4"><i class="bi bi-house me-2"></i>{{ '编辑' if dormitory else '添加' }}宿舍</h4>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">所属楼栋 <span class="text-danger">*</span></label>
            <select name="building_id" class="form-select" required>
                <option value="">请选择楼栋</option>
                {% for b in buildings %}
                <option value="{{ b.id }}" {% if dormitory and dormitory.building_id == b.id %}selected{% endif %}>{{ b.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">房间号 <span class="text-danger">*</span></label>
            <input type="text" name="room_number" class="form-control" value="{{ dormitory.room_number if dormitory else '' }}" placeholder="如：101" required>
        </div>
        <div class="mb-3">
            <label class="form-label">床位容量</label>
            <input type="number" name="capacity" class="form-control" value="{{ dormitory.capacity if dormitory else 4 }}" min="1" max="10">
        </div>
        {% if dormitory %}
        <div class="mb-3">
            <label class="form-label">当前人数</label>
            <input type="number" name="current_count" class="form-control" value="{{ dormitory.current_count if dormitory else 0 }}" min="0" max="{{ dormitory.capacity }}">
        </div>
        {% endif %}
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-2"></i>保存</button>
            <a href="{{ url_for('admin.dormitories') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
