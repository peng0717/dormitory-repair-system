{% extends "base.html" %}
{% block title %}维修项目管理{% endblock %}
{% block content %}
<div class="content-card">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-currency-dollar me-2"></i>维修项目价格</h4>
        <a href="{{ url_for('admin.repair_items_add') }}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-2"></i>添加项目
        </a>
    </div>
    
    <div class="table-responsive">
        <table class="table table-modern">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>项目名称</th>
                    <th>价格</th>
                    <th>描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td><strong>{{ item.name }}</strong></td>
                    <td><span class="text-success fw-bold">¥{{ item.price }}</span></td>
                    <td>{{ item.description or '-' }}</td>
                    <td>
                        <a href="{{ url_for('admin.repair_items_edit', id=item.id) }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <form method="POST" action="{{ url_for('admin.repair_items_delete', id=item.id) }}" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定要删除吗？')"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="text-center text-muted py-5">暂无维修项目</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
