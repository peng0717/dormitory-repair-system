{% extends "base.html" %}
{% block title %}{{ '编辑' if announcement else '发布' }}公告{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 700px;">
    <h4 class="mb-4"><i class="bi bi-megaphone me-2"></i>{{ '编辑' if announcement else '发布' }}公告</h4>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">标题 <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" value="{{ announcement.title if announcement else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">内容 <span class="text-danger">*</span></label>
            <textarea name="content" class="form-control" rows="8" required>{{ announcement.content if announcement else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-2"></i>保存</button>
            <a href="{{ url_for('admin.announcements') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
