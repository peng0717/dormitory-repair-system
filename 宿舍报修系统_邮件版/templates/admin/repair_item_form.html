{% extends "base.html" %}
{% block title %}{{ '编辑' if item else '添加' }}维修项目{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 600px;">
    <h4 class="mb-4"><i class="bi bi-currency-dollar me-2"></i>{{ '编辑' if item else '添加' }}维修项目</h4>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">项目名称 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ item.name if item else '' }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">价格(元) <span class="text-danger">*</span></label>
            <input type="number" name="price" class="form-control" value="{{ item.price if item else '' }}" step="0.01" min="0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">描述</label>
            <textarea name="description" class="form-control" rows="3">{{ item.description if item else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-2"></i>保存</button>
            <a href="{{ url_for('admin.repair_items') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
