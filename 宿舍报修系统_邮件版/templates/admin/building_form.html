{% extends "base.html" %}
{% block title %}{{ '编辑' if building else '添加' }}楼栋{% endblock %}
{% block content %}
<div class="content-card" style="max-width: 600px;">
    <h4 class="mb-4">
        <i class="bi bi-building me-2"></i>{{ '编辑' if building else '添加' }}楼栋
    </h4>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">楼栋名称 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" value="{{ building.name if building else '' }}" placeholder="如：1号楼" required>
        </div>
        <div class="mb-3">
            <label class="form-label">楼层数 <span class="text-danger">*</span></label>
            <input type="number" name="floors" class="form-control" value="{{ building.floors if building else '' }}" min="1" required>
        </div>
        <div class="mb-3">
            <label class="form-label">每层房间数 <span class="text-danger">*</span></label>
            <input type="number" name="rooms_per_floor" class="form-control" value="{{ building.rooms_per_floor if building else '' }}" min="1" required>
        </div>
        
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check2 me-2"></i>保存
            </button>
            <a href="{{ url_for('admin.buildings') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
